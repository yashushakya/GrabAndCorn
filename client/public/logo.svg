  <line x1="462" y1="80" x2="462" y2="252" style="fill:none;stroke:rgb(26, 26, 46);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-dasharray:5px, 5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

