  <text x="180" y="254" text-anchor="middle" style="fill:rgb(26, 26, 46);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:Arial, sans-serif;font-size:11px;font-weight:700;text-anchor:middle;dominant-baseline:auto">★ ★ ★ ★ ★ ★ ★ ★ ★ ★ ★ ★</text>
