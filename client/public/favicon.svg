<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a1a00"/>
      <stop offset="100%" stop-color="#0d0000"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#6b0000"/>
    </linearGradient>
    <linearGradient id="popcorn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Red badge -->
  <rect x="4" y="12" width="24" height="16" rx="4" fill="url(#badge)" stroke="#FFA500" stroke-width="0.8"/>

  <!-- Popcorn pieces above -->
  <ellipse cx="9"  cy="11" rx="3" ry="2.2" fill="url(#popcorn)" stroke="#cc7700" stroke-width="0.5"/>
  <ellipse cx="16" cy="9"  rx="3" ry="2.2" fill="url(#popcorn)" stroke="#cc7700" stroke-width="0.5"/>
  <ellipse cx="23" cy="11" rx="3" ry="2.2" fill="url(#popcorn)" stroke="#cc7700" stroke-width="0.5"/>

  <!-- "G" letter in gold -->
  <text x="16" y="23" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" font-style="italic" fill="url(#gold)" stroke="#7a2000" stroke-width="0.6" paint-order="stroke">G&amp;C</text>
</svg>
